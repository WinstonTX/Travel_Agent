<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🇮🇸 Iceland Planner · Redesign V3</title>
<!-- fonts: system fallback -->
<style>
:root{--bg:#1a2e22;--surface:rgba(255,252,245,0.07);--surface-hover:rgba(255,252,245,0.11);--card:rgba(255,252,245,0.88);--ink:#f5f0e8;--ink-dark:#2c2a25;--muted:rgba(245,240,232,0.5);--muted-dark:#8a8578;--accent:#6aab7b;--accent-warm:#c4a060;--border:rgba(255,252,245,0.12);--border-card:rgba(200,190,170,0.25);--shadow-sm:0 2px 12px rgba(0,0,0,0.12);--glass:blur(16px) saturate(1.6);--r:20px;--r-sm:14px;--r-xs:8px;--safe:#4ade80;--caution:#fbbf24;--danger:#f87171;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);background-image:radial-gradient(ellipse at 15% 50%,rgba(106,171,123,0.08) 0%,transparent 50%),radial-gradient(ellipse at 85% 20%,rgba(196,160,96,0.06) 0%,transparent 50%);color:var(--ink);font-family:-apple-system,'PingFang SC','Helvetica Neue',sans-serif,-apple-system,'PingFang SC',sans-serif;font-size:14px;line-height:1.6;min-height:100vh;}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:200;background:rgba(26,46,34,0.75);backdrop-filter:var(--glass);-webkit-backdrop-filter:var(--glass);padding:0 2rem;display:flex;align-items:center;gap:1rem;height:60px;border-bottom:1px solid var(--border);}
.tb-brand{font-family:'Georgia','Noto Serif SC',serif;font-size:1.2rem;font-style:italic;color:var(--accent);display:flex;align-items:center;gap:.5rem;}.tb-brand .flag{font-style:normal;font-size:1.4rem;}
.tb-sep{flex:1;}
.tb-pill{padding:.3rem .7rem;border-radius:100px;font-size:.6rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;background:rgba(106,171,123,0.15);color:var(--accent);border:1px solid rgba(106,171,123,0.25);}
.tb-meta{font-size:.6rem;color:var(--muted);}
.tb-btn{padding:.35rem .8rem;border-radius:var(--r-xs);font-size:.6rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;background:var(--surface);color:var(--ink);border:1px solid var(--border);transition:all .2s;font-family:inherit;}.tb-btn:hover{background:var(--surface-hover);}

/* TABS */
.tab-nav{display:flex;gap:0;background:rgba(26,46,34,0.5);backdrop-filter:blur(8px);padding:0 2rem;border-bottom:1px solid var(--border);}
.tab-btn{padding:.75rem 1.5rem;font-size:.82rem;font-weight:500;border:none;background:none;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .25s;font-family:inherit;}.tab-btn:hover{color:var(--ink);}.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600;}

/* Tab panes */
.tab-pane{display:none;}.tab-pane.active{display:block;}
.tab-frame-wrap{max-width:1100px;margin:0 auto;padding:1rem 2rem 2rem;}
.tab-frame-hint{text-align:center;font-size:.62rem;color:var(--muted);padding:.5rem 0;letter-spacing:.04em;}
.tab-frame-hint a{color:var(--accent);text-decoration:none;}.tab-frame-hint a:hover{text-decoration:underline;}
.tab-frame{width:100%;height:calc(100vh - 200px);min-height:600px;border:1px solid var(--border);border-radius:var(--r);background:#f5f0e8;box-shadow:var(--shadow-sm);}

/* ═══ HERO: 2-panel (Stats + Weather&Road) ═══ */
.hero{max-width:1100px;margin:0 auto;padding:1.2rem 2rem .8rem;}

/* Stats Panel */
.stats-panel{background:var(--surface);backdrop-filter:var(--glass);border:1px solid var(--border);border-radius:var(--r);padding:1rem 1.2rem;display:grid;grid-template-columns:1fr 1fr;gap:.6rem;}
.stat-item{padding:.5rem;background:rgba(255,252,245,0.03);border-radius:var(--r-xs);border:1px solid rgba(255,252,245,0.06);text-align:center;transition:all .2s;}
.stat-item:hover{background:rgba(255,252,245,0.07);transform:translateY(-1px);}
.stat-val{font-family:'Georgia','Noto Serif SC',serif;font-size:1.5rem;font-weight:700;color:var(--accent-warm);line-height:1;}
.stat-label{font-size:.5rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-top:.2rem;}

/* Weather + Road combined Panel */
.wr-panel{background:var(--surface);backdrop-filter:var(--glass);border:1px solid var(--border);border-radius:var(--r);padding:1rem 1.2rem;display:flex;flex-direction:column;gap:.5rem;}
/* Embedded version inside day-body: no outer chrome, inherits day-body background */
.wr-panel-embed{padding:1rem 1rem .5rem 1rem;display:flex;flex-direction:column;gap:.5rem;border-bottom:1px dashed var(--border);margin:0 0 .25rem 0;}

/* Today banner: pinned weather+road at top */
.today-banner{max-width:1100px;margin:0 auto;padding:1rem 2rem .5rem;}
.banner-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.banner-slot{background:var(--surface);backdrop-filter:var(--glass);border:1px solid var(--border);border-radius:var(--r);padding:1rem 1.1rem;display:flex;flex-direction:column;gap:.5rem;}
.banner-slot.banner-empty{min-height:140px;align-items:center;justify-content:center;text-align:center;opacity:.6;}
.slot-head{display:flex;align-items:baseline;justify-content:space-between;gap:.5rem;}
.slot-tag{font-family:'Georgia','Noto Serif SC',serif;font-size:1rem;color:var(--accent);font-weight:600;}
.slot-date{font-family:'SF Mono','Menlo','Courier New',monospace,monospace;font-size:.56rem;color:var(--muted);letter-spacing:.05em;}
.slot-title{font-family:'Georgia','Noto Serif SC',serif;font-size:.95rem;color:var(--ink);line-height:1.3;}
.slot-route{font-family:'SF Mono','Menlo','Courier New',monospace,monospace;font-size:.52rem;color:var(--accent);letter-spacing:.04em;text-transform:uppercase;opacity:.75;}
.slot-empty-msg{font-family:'Georgia','Noto Serif SC',serif;font-size:1.1rem;color:var(--muted);font-style:italic;}
.slot-section-label{font-size:.58rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--accent-warm);margin-top:.3rem;}
.slot-wx{margin-top:-.15rem;}
.slot-note{font-size:.52rem;color:var(--muted);line-height:1.45;padding-top:.4rem;border-top:1px solid var(--border);}
.slot-note strong{color:var(--accent-warm);}
.panel-header{display:flex;justify-content:space-between;align-items:center;}
.panel-title{font-size:.62rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);}
.panel-src{font-size:.46rem;color:var(--muted);font-family:'SF Mono','Menlo','Courier New',monospace,monospace;}

/* Weather stations - split today/tomorrow */
.wx-split{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.wx-day{background:rgba(255,252,245,0.03);border:1px solid rgba(255,252,245,0.06);border-radius:var(--r-sm);padding:.5rem;}
.wx-day-tomorrow{border-left:1px solid var(--border);}
.wx-day-label{font-size:.52rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--accent-warm);margin-bottom:.4rem;text-align:center;}
.wx-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.wx-card{background:rgba(255,252,245,0.05);border:1px solid rgba(255,252,245,0.08);border-radius:var(--r-xs);padding:.45rem .3rem;text-align:center;transition:all .2s;}.wx-card:hover{background:rgba(255,252,245,0.09);transform:translateY(-1px);}
.wx-icon{font-size:1.1rem;line-height:1;}
.wx-temp{font-family:'SF Mono','Menlo','Courier New',monospace,monospace;font-size:.95rem;font-weight:600;color:var(--ink);margin-top:.08rem;}
.wx-station{font-size:.46rem;color:var(--muted);margin-top:.04rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.wx-detail{font-family:'SF Mono','Menlo','Courier New',monospace,monospace;font-size:.42rem;color:var(--muted);}

/* Divider */
.panel-divider{height:1px;background:var(--border);margin:.15rem 0;}

/* Road conditions (inline in same panel) */
.road-rows{display:flex;flex-direction:column;gap:4px;}
.route-row{display:flex;align-items:center;gap:.5rem;padding:.25rem .4rem;background:rgba(255,252,245,0.03);border-radius:6px;border:1px solid rgba(255,252,245,0.06);font-size:.6rem;transition:all .15s;}
.route-row:hover{background:rgba(255,252,245,0.07);}
.route-num{font-family:'SF Mono','Menlo','Courier New',monospace,monospace;font-size:.62rem;font-weight:700;color:var(--accent-warm);min-width:40px;}
.route-name{color:var(--ink);flex:1;font-size:.58rem;}
.route-status{display:flex;align-items:center;gap:.2rem;font-size:.5rem;font-weight:600;padding:.1rem .35rem;border-radius:4px;white-space:nowrap;}
.rs-safe{background:rgba(74,222,128,0.12);color:var(--safe);border:1px solid rgba(74,222,128,0.2);}
.rs-caution{background:rgba(251,191,36,0.12);color:var(--caution);border:1px solid rgba(251,191,36,0.2);}
.rs-danger{background:rgba(248,113,113,0.12);color:var(--danger);border:1px solid rgba(248,113,113,0.2);}
.route-reason{font-family:'SF Mono','Menlo','Courier New',monospace,monospace;font-size:.42rem;color:var(--muted);white-space:nowrap;}

/* Bottom note */
.panel-note{font-size:.52rem;color:var(--muted);line-height:1.4;padding-top:.3rem;border-top:1px solid var(--border);}
.panel-note strong{color:var(--accent-warm);}

/* ═══ MAIN ═══ */
main{max-width:1100px;margin:0 auto;padding:.5rem 2rem 3rem;}
.day-block{background:var(--surface);backdrop-filter:var(--glass);border:1px solid var(--border);border-radius:var(--r);margin-bottom:1rem;overflow:hidden;transition:all .3s;}.day-block:hover{background:var(--surface-hover);box-shadow:var(--shadow-sm);transform:translateY(-1px);}
.day-toggle{width:100%;background:none;border:none;cursor:pointer;padding:0;display:flex;align-items:stretch;text-align:left;font-family:inherit;color:inherit;}
.day-color-bar{width:4px;flex-shrink:0;background:linear-gradient(180deg,var(--accent),var(--accent-warm));border-radius:4px 0 0 4px;}
.day-num-col{width:100px;min-width:100px;flex-shrink:0;background:rgba(255,252,245,0.04);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:.8rem .5rem;gap:.2rem;border-right:1px solid var(--border);}
.dn-label{font-size:.42rem;letter-spacing:.15em;text-transform:uppercase;color:#fff;background:linear-gradient(135deg,var(--accent),#4a8a5a);padding:.15rem .5rem;border-radius:4px;font-weight:700;}
.dn-date{font-family:'Georgia','Noto Serif SC',serif;font-size:1.3rem;font-weight:700;color:var(--accent-warm);line-height:1.1;text-align:center;}
.dn-weekday{font-family:'SF Mono','Menlo','Courier New',monospace,monospace;font-size:.5rem;color:var(--muted);letter-spacing:.08em;}
.day-header-body{flex:1;padding:.9rem 1.2rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;}
.day-route{font-family:'SF Mono','Menlo','Courier New',monospace,monospace;font-size:.56rem;color:var(--accent);letter-spacing:.04em;text-transform:uppercase;margin-bottom:.15rem;opacity:.7;}
.day-title{font-family:'Georgia','Noto Serif SC',serif;font-size:1.05rem;line-height:1.3;color:var(--ink);}
.day-meta{display:flex;gap:1.2rem;align-items:center;flex-shrink:0;}
.dm-stat{text-align:center;}.dm-stat .v{font-family:'SF Mono','Menlo','Courier New',monospace,monospace;font-size:.9rem;display:block;color:var(--ink);font-weight:500;}.dm-stat .l{font-size:.46rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);}
.chevron{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:.55rem;transition:all .3s;}
.day-toggle[aria-expanded="true"] .chevron{transform:rotate(180deg);background:var(--accent);color:#fff;border-color:var(--accent);}
.day-body{display:none;border-top:1px solid var(--border);}.day-body.open{display:block;}

/* SEGMENT CARDS */
.seg-list{padding:1rem;display:flex;flex-direction:column;gap:.5rem;}
.seg-card{display:flex;background:var(--card);border:1px solid var(--border-card);border-radius:var(--r-sm);overflow:hidden;transition:all .25s;color:var(--ink-dark);border-left:3px solid transparent;}.seg-card:hover{box-shadow:var(--shadow-sm);border-left-color:var(--accent);transform:translateX(2px);}
.seg-left{width:150px;min-width:150px;background:linear-gradient(180deg,#f0eee6,#e8e4d8);padding:.55rem .65rem;display:flex;flex-direction:column;gap:.25rem;border-right:1px solid rgba(200,190,170,0.2);}
.seg-time{font-family:'SF Mono','Menlo','Courier New',monospace,monospace;font-size:1.05rem;font-weight:600;color:#2d5a3d;line-height:1;}
.seg-tags{display:flex;gap:.2rem;flex-wrap:wrap;}
.seg-transport{display:inline-flex;font-size:.55rem;padding:.1rem .35rem;border-radius:4px;background:#e5dfd2;color:#8b6f47;white-space:nowrap;}
.seg-km{font-family:'SF Mono','Menlo','Courier New',monospace,monospace;font-size:.55rem;padding:.1rem .35rem;border-radius:4px;background:#dceede;color:#2d6b4a;font-weight:500;}
.seg-badge{display:inline-flex;padding:.12rem .4rem;border-radius:5px;font-size:.55rem;font-weight:600;white-space:nowrap;width:fit-content;margin-top:auto;}
.badge-booked{background:#ddf2e4;color:#2d6b4a;border:1px solid rgba(45,107,74,0.15);}
.badge-pending{background:#fdf2e0;color:#9a6b2a;border:1px solid rgba(154,107,42,0.15);}
.badge-nobook{background:rgba(0,0,0,.04);color:#8a8578;}
.seg-right{flex:1;padding:.55rem .75rem;display:flex;flex-direction:column;gap:.2rem;}
.seg-name{font-size:.84rem;font-weight:600;line-height:1.35;color:var(--ink-dark);}
.seg-sub{font-size:.66rem;color:var(--muted-dark);line-height:1.35;}
.seg-section{padding-top:.2rem;border-top:1px dashed rgba(200,190,170,0.35);}
.seg-section-lbl{font-size:.46rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted-dark);font-weight:600;margin-bottom:.08rem;}
.seg-section-val{font-size:.7rem;color:#4a4840;line-height:1.5;}
.seg-section-val ul{list-style:none;padding:0;}.seg-section-val ul li{padding-left:.65rem;position:relative;margin-bottom:.04rem;}.seg-section-val ul li::before{content:'\00b7';position:absolute;left:0;color:#2d5a3d;font-weight:700;}
.seg-notes{font-family:'SF Mono','Menlo','Courier New',monospace,monospace;font-size:.6rem;color:var(--muted-dark);white-space:pre-line;line-height:1.5;}

/* FOOTER */
.footer{max-width:1100px;margin:0 auto;padding:1.5rem 2rem;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.footer-note{font-size:.58rem;color:var(--muted);letter-spacing:.06em;}
.footer-stats{display:flex;gap:2rem;}
.footer-stat .v{font-family:'Georgia','Noto Serif SC',serif;font-size:1.3rem;display:block;color:var(--accent-warm);font-weight:600;}.footer-stat .l{font-size:.48rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.day-block{animation:fadeUp .4s ease-out backwards;}.day-block:nth-child(1){animation-delay:.05s;}.day-block:nth-child(2){animation-delay:.1s;}
.stat-item{animation:fadeUp .4s ease-out backwards;}
.wx-card{animation:fadeUp .35s ease-out backwards;}
.route-row{animation:fadeUp .3s ease-out backwards;}
.seg-card{animation:fadeUp .3s ease-out backwards;}

@media(max-width:768px){
  .topbar{padding:0 .75rem;height:44px;gap:.4rem;overflow:hidden;}
  .tb-brand{font-size:.95rem;gap:.3rem;white-space:nowrap;flex-shrink:0;}
  .tb-meta{display:none !important;}.tb-btn{display:none !important;}
  .tb-pill{font-size:.48rem;padding:.18rem .45rem;flex-shrink:0;}
  .tb-sep{flex:1;min-width:0;}
  .tab-nav{padding:0 .5rem;overflow-x:auto;}
  .tab-btn{padding:.55rem .7rem;font-size:.74rem;white-space:nowrap;}
  .hero{padding:.6rem .75rem .4rem;}
  .stats-panel{grid-template-columns:1fr 1fr;gap:.35rem;padding:.6rem .7rem;}
  .stat-val{font-size:1.1rem;}.stat-label{font-size:.44rem;}
  .today-banner{padding:.5rem .75rem .3rem;}
  .banner-grid{grid-template-columns:1fr;}.banner-slot{padding:.6rem .7rem;}
  .wx-split{grid-template-columns:1fr;}
  .wx-day-tomorrow{border-left:none;border-top:1px solid var(--border);padding-top:.4rem;}
  main{padding:.3rem .6rem 2rem;}
  .day-block{margin-bottom:.6rem;border-radius:var(--r-sm);}
  .day-num-col{width:58px;min-width:58px;padding:.4rem .25rem;gap:.08rem;}
  .dn-label{font-size:.36rem;padding:.08rem .3rem;}
  .dn-date{font-size:.95rem;}.dn-weekday{font-size:.4rem;}
  .day-header-body{padding:.5rem .55rem;gap:.4rem;min-width:0;overflow:hidden;}
  .day-route{font-size:.44rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .day-title{font-size:.82rem;line-height:1.25;overflow-wrap:break-word;word-break:break-word;}
  .day-meta{gap:.4rem;flex-shrink:0;}
  .dm-stat .v{font-size:.7rem;}.dm-stat .l{font-size:.38rem;}
  .chevron{width:26px;height:26px;min-width:26px;font-size:.5rem;}
  .seg-list{padding:.5rem;}
  .seg-card{flex-direction:column;border-radius:var(--r-xs);}
  .seg-left{width:100%;min-width:0;flex-direction:row;align-items:center;gap:.35rem;padding:.35rem .55rem;border-right:none;border-bottom:1px solid rgba(200,190,170,0.2);flex-wrap:wrap;}
  .seg-time{font-size:.85rem;min-width:auto;flex-shrink:0;}
  .seg-tags{gap:.12rem;}.seg-transport,.seg-km{font-size:.48rem;padding:.06rem .25rem;}
  .seg-badge{font-size:.48rem;padding:.06rem .28rem;margin-top:0;}
  .seg-right{padding:.45rem .6rem;}
  .seg-name{font-size:.78rem;}.seg-sub{font-size:.6rem;}
  .seg-section-val{font-size:.64rem;}
  .seg-notes{font-size:.54rem;word-break:break-word;overflow-wrap:break-word;}
  .footer{flex-direction:column;gap:.7rem;text-align:center;padding:.8rem .75rem;}
  .footer-stats{gap:1rem;justify-content:center;}.footer-stat .v{font-size:1rem;}
  .tab-frame-wrap{padding:.5rem .6rem .8rem;}
  .tab-frame{height:calc(100vh - 150px);min-height:350px;border-radius:var(--r-sm);}
  .route-row{flex-wrap:wrap;gap:.25rem;}
  .route-reason{white-space:normal;word-break:break-word;}
  .split-cols{grid-template-columns:1fr !important;}
})();
</script>


<div class="footer">
  <div class="footer-note">🇮🇸 Iceland Ring Road · Apr–May 2026 · Weather by vedur.is</div>
  <div class="footer-stats">
    <div class="footer-stat"><span class="v">12</span><span class="l">天</span></div>
    <div class="footer-stat"><span class="v">123</span><span class="l">行程段</span></div>
    <div class="footer-stat"><span class="v">2,531</span><span class="l">km</span></div>
  </div>
</div>
</div>
</body>
</html>
